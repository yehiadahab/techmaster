<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Home / Dashboard — Driver App Wireframe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #e8e8e8; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem; gap: 12px; }
    .label { font-size: 14px; font-weight: 600; color: #222; }
    .sublabel { font-size: 11px; color: #888; }
    .phone { width: 280px; border: 3px solid #2c2c2c; border-radius: 36px; overflow: hidden; }
    .statusbar { height: 24px; background: #2c2c2c; display: flex; align-items: center; justify-content: space-between; padding: 0 14px; }
    .homebar { height: 20px; background: #f0f0f0; border-top: 1px solid #ddd; display: flex; align-items: center; justify-content: center; }
    .screen { height: 548px; overflow: hidden; background: #f5f5f5; display: flex; flex-direction: column; }
    .nav-bar { display: flex; gap: 8px; align-items: center; justify-content: center; }
    .nav-btn { font-size: 12px; color: #555; text-decoration: none; background: #fff; border: 1px solid #ddd; border-radius: 6px; padding: 6px 14px; transition: border-color 0.15s, color 0.15s; }
    .nav-btn:hover { border-color: #999; color: #111; }
    .nav-btn.home { background: #222; color: #fff; border-color: #222; }
    .nav-btn.home:hover { background: #444; border-color: #444; }
  </style>
</head>
<body>

  <div class="label">Home / Dashboard</div>
  <div class="sublabel">Dashboard</div>

  <div class="nav-bar">
    <a class="nav-btn" href="index.html">&#8592; Back</a>
    <a class="nav-btn home" href="index.html">&#8962; Home</a>
    <a class="nav-btn" href="screen_02_orders.html">Next &#8594;</a>
  </div>

  <div class="phone">
    <div class="statusbar">
      <span style="color:#888;font-size:9px;">9:41</span>
      <div style="width:48px;height:7px;background:#555;border-radius:4px;"></div>
      <span style="color:#888;font-size:8px;">&#9679; &#9679; &#9679;</span>
    </div>

    <div class="screen">

      <!-- Toolbar -->
      <div style="height:48px;background:#fff;border-bottom:1px solid #ddd;display:flex;align-items:center;padding:0 10px;flex-shrink:0;">
        <div style="display:flex;align-items:center;gap:6px;flex:1;">
          <div style="width:44px;height:22px;border:1px dashed #ccc;border-radius:3px;display:flex;align-items:center;justify-content:center;">
            <span style="font-size:8px;color:#bbb;">LOGO</span>
          </div>
          <div style="border:1px solid #ccc;border-radius:10px;padding:2px 8px;">
            <span style="font-size:9px;color:#999;">On / Off</span>
          </div>
        </div>
        <div style="display:flex;gap:6px;">
          <div style="width:24px;height:24px;border:1px solid #ccc;border-radius:4px;display:flex;align-items:center;justify-content:center;"><span style="font-size:9px;color:#aaa;">?</span></div>
          <div style="width:24px;height:24px;border:1px solid #ccc;border-radius:4px;display:flex;align-items:center;justify-content:center;"><span style="font-size:9px;color:#aaa;">&#8618;</span></div>
        </div>
      </div>

      <!-- Profile row -->
      <div style="background:#eaeaea;padding:10px 12px;display:flex;align-items:center;flex-shrink:0;">
        <div style="width:40px;height:40px;border-radius:8px;border:1px dashed #c0c0c0;background:#d8d8d8;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
          <span style="font-size:8px;color:#aaa;">Photo</span>
        </div>
        <div style="margin-left:10px;flex:1;">
          <div style="height:9px;background:#c8c8c8;border-radius:2px;width:80px;margin-bottom:5px;"></div>
          <div style="height:8px;background:#d5d5d5;border-radius:2px;width:48px;"></div>
        </div>
        <div style="width:32px;height:32px;border:1px solid #ccc;border-radius:6px;background:#fff;display:flex;align-items:center;justify-content:center;">
          <span style="font-size:9px;color:#bbb;">Bell</span>
        </div>
      </div>

      <!-- New Requests banner -->
      <div style="margin:8px 10px;border:1.5px dashed #ccc;border-radius:5px;padding:8px 10px;display:flex;align-items:center;background:#fff;flex-shrink:0;">
        <div style="width:18px;height:18px;border:1px solid #ccc;border-radius:3px;background:#eee;display:flex;align-items:center;justify-content:center;margin-right:8px;">
          <span style="font-size:9px;color:#bbb;">!</span>
        </div>
        <span style="font-size:10px;color:#888;flex:1;">New Requests</span>
        <div style="width:28px;height:22px;background:#ccc;border-radius:4px;display:flex;align-items:center;justify-content:center;">
          <span style="font-size:11px;color:#555;font-weight:500;">3</span>
        </div>
      </div>

      <!-- Stats 2x2 grid -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;margin:0 10px 6px;flex-shrink:0;">
        <div style="background:#e0e0e0;border-radius:4px;padding:10px 6px;display:flex;flex-direction:column;align-items:center;gap:4px;">
          <div style="width:24px;height:24px;border-radius:50%;border:1px dashed #bbb;background:#d0d0d0;"></div>
          <div style="font-size:9px;color:#777;text-align:center;line-height:1.3;">Cash on Pocket</div>
          <div style="font-size:14px;font-weight:500;color:#555;">0 SAR</div>
        </div>
        <div style="background:#e0e0e0;border-radius:4px;padding:10px 6px;display:flex;flex-direction:column;align-items:center;gap:4px;">
          <div style="width:24px;height:24px;border-radius:50%;border:1px dashed #bbb;background:#d0d0d0;"></div>
          <div style="font-size:9px;color:#777;text-align:center;line-height:1.3;">Penalties</div>
          <div style="font-size:14px;font-weight:500;color:#555;">0 SAR</div>
        </div>
        <div style="background:#e0e0e0;border-radius:4px;padding:10px 6px;display:flex;flex-direction:column;align-items:center;gap:4px;">
          <div style="width:24px;height:24px;border-radius:50%;border:1px dashed #bbb;background:#d0d0d0;"></div>
          <div style="font-size:9px;color:#777;text-align:center;line-height:1.3;">Orders Today</div>
          <div style="font-size:14px;font-weight:500;color:#555;">0</div>
        </div>
        <div style="background:#e0e0e0;border-radius:4px;padding:10px 6px;display:flex;flex-direction:column;align-items:center;gap:4px;">
          <div style="width:24px;height:24px;border-radius:50%;border:1px dashed #bbb;background:#d0d0d0;"></div>
          <div style="font-size:9px;color:#777;text-align:center;line-height:1.3;">Orders This Month</div>
          <div style="font-size:14px;font-weight:500;color:#555;">0</div>
        </div>
      </div>

      <!-- Shifts -->
      <div style="margin:4px 10px 0;flex-shrink:0;">
        <div style="font-size:11px;color:#666;font-weight:500;margin-bottom:6px;">Shifts</div>
        <div style="background:#e8e8e8;border-radius:4px;padding:8px 10px;margin-bottom:4px;display:flex;align-items:center;justify-content:space-between;">
          <span style="font-size:10px;color:#666;">Saturday</span>
          <span style="font-size:10px;color:#999;">09:00 &#8211; 17:00</span>
        </div>
        <div style="background:#e8e8e8;border-radius:4px;padding:8px 10px;margin-bottom:4px;display:flex;align-items:center;justify-content:space-between;">
          <span style="font-size:10px;color:#666;">Sunday</span>
          <span style="font-size:10px;color:#999;">09:00 &#8211; 17:00</span>
        </div>
      </div>

    </div>

    <div class="homebar">
      <div style="width:80px;height:4px;background:#ccc;border-radius:2px;"></div>
    </div>
  </div>

</body>
</html>
