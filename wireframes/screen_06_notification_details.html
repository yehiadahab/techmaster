<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notification Details — Driver App Wireframe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #e8e8e8; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem; gap: 12px; }
    .label { font-size: 14px; font-weight: 600; color: #222; }
    .sublabel { font-size: 11px; color: #888; }
    .phone { width: 280px; border: 3px solid #2c2c2c; border-radius: 36px; overflow: hidden; }
    .statusbar { height: 24px; background: #2c2c2c; display: flex; align-items: center; justify-content: space-between; padding: 0 14px; }
    .homebar { height: 20px; background: #f0f0f0; border-top: 1px solid #ddd; display: flex; align-items: center; justify-content: center; }
    .screen { height: 548px; overflow: hidden; background: #fff; display: flex; flex-direction: column; }
    .map { height: 200px; background: #e5e5e5; background-image: linear-gradient(#d8d8d8 1px, transparent 1px), linear-gradient(90deg, #d8d8d8 1px, transparent 1px); background-size: 24px 24px; position: relative; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .nav-bar { display: flex; gap: 8px; align-items: center; justify-content: center; }
    .nav-btn { font-size: 12px; color: #555; text-decoration: none; background: #fff; border: 1px solid #ddd; border-radius: 6px; padding: 6px 14px; transition: border-color 0.15s, color 0.15s; }
    .nav-btn:hover { border-color: #999; color: #111; }
    .nav-btn.home { background: #222; color: #fff; border-color: #222; }
    .nav-btn.home:hover { background: #444; border-color: #444; }
  </style>
</head>
<body>

  <div class="label">Notification Details</div>
  <div class="sublabel">Notifications</div>

  <div class="nav-bar">
    <a class="nav-btn" href="screen_05_notifications.html">&#8592; Back</a>
    <a class="nav-btn home" href="index.html">&#8962; Home</a>
    <a class="nav-btn" href="screen_07_my_profile.html">Next &#8594;</a>
  </div>

  <div class="phone">
    <div class="statusbar">
      <span style="color:#888;font-size:9px;">9:41</span>
      <div style="width:48px;height:7px;background:#555;border-radius:4px;"></div>
      <span style="color:#888;font-size:8px;">&#9679; &#9679; &#9679;</span>
    </div>

    <div class="screen">

      <!-- Toolbar -->
      <div style="height:40px;background:#fff;border-bottom:1px solid #ddd;display:flex;align-items:center;padding:0 12px;flex-shrink:0;">
        <span style="color:#888;font-size:14px;margin-right:10px;">&#8592;</span>
        <span style="font-size:12px;font-weight:500;color:#444;">Notification</span>
      </div>

      <!-- Notification card -->
      <div style="padding:10px 8px;flex-shrink:0;">
        <div style="background:#fff;border-radius:6px;padding:12px;border:0.5px solid #e8e8e8;display:flex;align-items:flex-start;gap:10px;">
          <div style="width:28px;height:28px;border:1px solid #ddd;border-radius:4px;background:#f5f5f5;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
            <span style="font-size:11px;color:#bbb;">&#9993;</span>
          </div>
          <div>
            <div style="font-size:12px;color:#333;font-weight:500;margin-bottom:5px;">New Order Assigned</div>
            <div style="font-size:10px;color:#666;line-height:1.6;">Order #1042 has been assigned to you. Please confirm and head to the pickup location as soon as possible.</div>
          </div>
        </div>
      </div>

      <!-- Map -->
      <div class="map">
        <span style="font-size:11px;color:#bbb;letter-spacing:1px;">[ MAP ]</span>
      </div>

      <!-- Go to location button -->
      <div style="padding:8px;background:#fff;flex-shrink:0;">
        <div style="background:#555;border-radius:4px;padding:9px;text-align:center;">
          <span style="color:#eee;font-size:10px;">&#10148; Go to Location</span>
        </div>
      </div>

    </div>

    <div class="homebar">
      <div style="width:80px;height:4px;background:#ccc;border-radius:2px;"></div>
    </div>
  </div>

</body>
</html>
