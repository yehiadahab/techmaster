<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us — Driver App Wireframe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #e8e8e8; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem; gap: 12px; }
    .label { font-size: 14px; font-weight: 600; color: #222; }
    .sublabel { font-size: 11px; color: #888; }
    .phone { width: 280px; border: 3px solid #2c2c2c; border-radius: 36px; overflow: hidden; }
    .statusbar { height: 24px; background: #2c2c2c; display: flex; align-items: center; justify-content: space-between; padding: 0 14px; }
    .homebar { height: 20px; background: #f0f0f0; border-top: 1px solid #ddd; display: flex; align-items: center; justify-content: center; }
    .screen { height: 548px; overflow: hidden; background: #3d3d3d; display: flex; flex-direction: column; }
    .nav-bar { display: flex; gap: 8px; align-items: center; justify-content: center; }
    .nav-btn { font-size: 12px; color: #555; text-decoration: none; background: #fff; border: 1px solid #ddd; border-radius: 6px; padding: 6px 14px; transition: border-color 0.15s, color 0.15s; }
    .nav-btn:hover { border-color: #999; color: #111; }
    .nav-btn.home { background: #222; color: #fff; border-color: #222; }
    .nav-btn.home:hover { background: #444; border-color: #444; }
  </style>
</head>
<body>

  <div class="label">Contact Us</div>
  <div class="sublabel">Support</div>

  <div class="nav-bar">
    <a class="nav-btn" href="screen_07_my_profile.html">&#8592; Back</a>
    <a class="nav-btn home" href="index.html">&#8962; Home</a>
    <a class="nav-btn" href="index.html">Next &#8594;</a>
  </div>

  <div class="phone">
    <div class="statusbar">
      <span style="color:#888;font-size:9px;">9:41</span>
      <div style="width:48px;height:7px;background:#555;border-radius:4px;"></div>
      <span style="color:#888;font-size:8px;">&#9679; &#9679; &#9679;</span>
    </div>

    <div class="screen">

      <!-- Toolbar -->
      <div style="height:40px;background:#2d2d2d;display:flex;align-items:center;padding:0 12px;flex-shrink:0;">
        <span style="color:#aaa;font-size:14px;margin-right:10px;">&#8592;</span>
        <span style="font-size:12px;font-weight:500;color:#ccc;">Contact Us</span>
      </div>

      <!-- Logo/Image placeholder -->
      <div style="width:100%;height:90px;border-bottom:2px dashed #666;display:flex;align-items:center;justify-content:center;background:#4a4a4a;flex-shrink:0;">
        <span style="color:#999;font-size:11px;">[ IMAGE / LOGO ]</span>
      </div>

      <!-- Form area -->
      <div style="padding:8px 20px 0;flex:1;display:flex;flex-direction:column;gap:12px;">

        <!-- Ask for help tag -->
        <div style="display:flex;align-items:center;justify-content:flex-end;">
          <div style="border:1px solid #777;border-radius:12px;padding:3px 10px;display:flex;align-items:center;gap:5px;">
            <div style="width:14px;height:14px;background:#666;border-radius:50%;"></div>
            <span style="color:#bbb;font-size:9px;">Ask for help</span>
          </div>
        </div>

        <!-- Subject + Type row -->
        <div style="display:flex;gap:8px;">
          <div style="flex:1;">
            <div style="color:#888;font-size:9px;margin-bottom:4px;">Subject</div>
            <div style="height:28px;border-bottom:1px solid #666;"></div>
          </div>
          <div style="width:80px;">
            <div style="color:#888;font-size:9px;margin-bottom:4px;">Type</div>
            <div style="border:1px solid #666;border-radius:4px;padding:4px 6px;display:flex;justify-content:space-between;align-items:center;">
              <span style="font-size:9px;color:#888;">General</span>
              <span style="font-size:8px;color:#666;">&#9660;</span>
            </div>
          </div>
        </div>

        <!-- Description -->
        <div>
          <div style="color:#888;font-size:9px;margin-bottom:4px;">Description</div>
          <div style="height:80px;border:1px solid #666;border-radius:4px;"></div>
        </div>

      </div>

      <!-- Send button -->
      <div style="height:44px;background:#777;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
        <span style="color:#eee;font-size:12px;letter-spacing:2px;">SEND</span>
      </div>

    </div>

    <div class="homebar">
      <div style="width:80px;height:4px;background:#ccc;border-radius:2px;"></div>
    </div>
  </div>

</body>
</html>
